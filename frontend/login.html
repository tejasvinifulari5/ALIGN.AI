<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | ALIGN.AI</title>

    <!-- External Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/login.css">

  </head>
  <body>
    <main class="auth-wrapper">
      <div class="auth-card">
        <!-- Branding Section -->
        <header class="text-center mb-8">
          <div class="brand-logo-box">
            <img src="assets/logo.png" alt="ALIGN.AI Logo" class="logo-img" />
          </div>
          <h1 class="brand-title">
            ALIGN.<span class="text-blue-600">AI</span>
          </h1>
          <p class="text-slate-500 mt-1 text-sm">Welcome back. Please login.</p>
        </header>

        <!-- Main Auth Form -->
        <form id="loginForm" onsubmit="loginUser(event)">
          <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              required
              class="input-field"
            />
          </div>

          <div class="form-group">
            <label for="passwordField" class="form-label">Password</label>
            <div class="relative">
              <input
                type="password"
                id="passwordField"
                name="password"
                required
                class="input-field"
              />
              <button
                type="button"
                id="toggleBtn"
                class="password-toggle"
                aria-label="Toggle password visibility"
              >
                <i id="toggleIcon" class="far fa-eye"></i>
              </button>
            </div>
            <p class="hint">
              <i class="fas fa-info-circle"></i> Min. 8 characters
            </p>
          </div>

          <div class="flex items-center justify-between mt-4 mb-6">
            <label
              class="flex items-center text-xs text-slate-500 cursor-pointer"
            >
              <input
                type="checkbox"
                class="mr-2 rounded border-slate-300 accent-blue-600"
              />
              Remember me
            </label>
            <a
              href="#"
              class="text-xs font-semibold text-blue-600 hover:underline"
              >Forgot password?</a
            >
          </div>

          <button type="submit" id="submitBtn" class="btn-primary">
            Login
          </button>
        </form>

        <footer class="mt-8 pt-6 border-t border-slate-100 text-center">
          <p class="text-sm text-slate-500 mb-4">
            New here?
            <a
              href="register.html"
              class="text-blue-600 font-bold hover:underline"
              >Create an account</a
            >
          </p>
          <div
            class="text-slate-400 text-[10px] uppercase tracking-widest font-bold"
          >
            &copy; 2026 ALIGN.AI
          </div>
        </footer>
      </div>
    </main>

    
  <script src="js/login.js"></script> 
  </body>
</html>
