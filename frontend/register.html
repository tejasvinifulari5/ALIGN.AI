<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | ALIGN.AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --surface: #f8fafc;
        --border: #e2e8f0;
      }

      body {
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #fdfdfd;
      }

      .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .auth-card {
        width: 100%;
        max-width: 440px;
        background: #fff;
        padding: 2.5rem;
        border-radius: 24px;
        border: 1px solid var(--border);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
      }

      .brand-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 1.25rem;
        background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
        border: 1px solid #bfdbfe;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.1);
      }

      .brand-title {
        font-size: 1.875rem;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.025em;
        line-height: 1.2;
      }

      .field-group {
        margin-bottom: 1.25rem;
      }

      .field-label {
        display: block;
        font-size: 0.813rem;
        font-weight: 600;
        color: #475569;
        margin-bottom: 0.5rem;
        margin-left: 0.1rem;
      }

      .control {
        width: 100%;
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        font-size: 0.938rem;
        color: #1e293b;
        transition: all 0.2s ease;
      }

      .control:focus {
        outline: none;
        border-color: var(--primary);
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
      }

      .control[type="password"] {
        letter-spacing: 0.15em;
      }

      .suggestion-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.5rem;
        min-height: 28px;
      }

      .chip {
        font-size: 0.75rem;
        background-color: #eff6ff;
        color: var(--primary);
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        cursor: pointer;
        border: 1px solid #dbeafe;
        transition: all 0.2s;
      }

      .chip:hover {
        background-color: #dbeafe;
        transform: translateY(-1px);
      }

      .status-msg {
        font-size: 0.7rem;
        margin-top: 0.4rem;
        display: flex;
        align-items: center;
        gap: 0.25rem;
        font-weight: 500;
      }

      .view-toggle {
        position: absolute;
        right: 0.875rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        cursor: pointer;
        padding: 4px;
        font-size: 0.9rem;
      }

      .hint {
        font-size: 0.75rem;
        color: #64748b;
        margin-top: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }

      .btn-submit {
        width: 100%;
        background-color: var(--primary);
        color: #fff;
        padding: 0.875rem;
        border-radius: 12px;
        font-weight: 700;
        font-size: 0.938rem;
        transition: all 0.2s;
        margin-top: 1rem;
        box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
      }

      .btn-submit:active {
        transform: scale(0.98);
      }

      .btn-submit:hover:not(:disabled) {
        background-color: var(--primary-dark);
      }

      .btn-submit:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card">
        <header class="text-center mb-10">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" class="w-8 h-8 text-blue-600" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="5" r="3" fill="currentColor" />
              <path d="M12 9V22M12 9L16 13M12 9L8 13M12 15L16 19M12 15L8 19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <h1 class="brand-title">ALIGN.<span class="text-blue-600">AI</span></h1>
          <p class="text-slate-500 mt-2 text-sm">Start your AI-powered posture analysis journey.</p>
        </header>

        <form id="authForm" novalidate>
          <div class="field-group">
            <label class="field-label">Full Name</label>
            <input type="text" id="name" required class="control" autocomplete="name" />
          </div>

          <div class="field-group">
            <label class="field-label">Email Address</label>
            <input type="email" id="email" required class="control" autocomplete="email" />
          </div>

          <div class="field-group">
            <label class="field-label">Username</label>
            <input type="text" id="handle" required class="control" />
            <div id="handleStatus"></div>
            <div id="handleRecs" class="suggestion-list"></div>
          </div>

          <div class="field-group">
            <label class="field-label">Password</label>
            <div class="relative">
              <input type="password" id="pass" required class="control" autocomplete="new-password" />
              <button type="button" class="view-toggle" data-target="pass">
                <i class="far fa-eye"></i>
              </button>
            </div>
            <p class="hint"><i class="fas fa-info-circle"></i> Min. 8 characters</p>
          </div>

          <div class="field-group">
            <label class="field-label">Confirm Password</label>
            <div class="relative">
              <input type="password" id="confirm" required class="control" autocomplete="new-password" />
              <button type="button" class="view-toggle" data-target="confirm">
                <i class="far fa-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" id="submitBtn" class="btn-submit">Create Account</button>
          
          <div class="text-center mt-6">
            <p class="text-sm text-slate-500">
              Already have an account? <a href="login.html" class="text-blue-600 font-semibold hover:underline">Log in</a>
            </p>
          </div>
        </form>

        <footer class="text-slate-400 text-[10px] text-center mt-8 uppercase tracking-widest font-bold">
          &copy; 2026 ALIGN.AI
        </footer>
      </div>
    </div>

    <script>
      (function() {
        const CONFIG = {
          existingUsers: ['johndoe', 'admin', 'posture_pro', 'align_master', 'user123'],
          minPassLength: 8
        };

        const elements = {
          form: document.getElementById('authForm'),
          name: document.getElementById('name'),
          handle: document.getElementById('handle'),
          email: document.getElementById('email'),
          pass: document.getElementById('pass'),
          confirm: document.getElementById('confirm'),
          recs: document.getElementById('handleRecs'),
          status: document.getElementById('handleStatus'),
          submit: document.getElementById('submitBtn'),
          toggles: document.querySelectorAll('.view-toggle')
        };

        const state = {
          isHandleTouched: false
        };

        // --- Logic ---

        const checkHandle = (val) => {
          if (!val || val.length < 2) {
            elements.status.innerHTML = '';
            elements.handle.style.borderColor = '';
            return;
          }

          const isTaken = CONFIG.existingUsers.includes(val.toLowerCase().trim());
          
          if (isTaken) {
            elements.status.innerHTML = `<span class="status-msg text-red-500"><i class="fas fa-times-circle"></i> Already taken</span>`;
            elements.handle.style.borderColor = '#ef4444';
          } else {
            elements.status.innerHTML = `<span class="status-msg text-green-600"><i class="fas fa-check-circle"></i> Available</span>`;
            elements.handle.style.borderColor = '#22c55e';
          }
        };

        const updateRecs = (name) => {
          if (!name || name.trim().length < 2) {
            elements.recs.innerHTML = '';
            return;
          }

          const clean = name.toLowerCase().trim().replace(/[^a-z0-9\s]/g, '');
          const bits = clean.split(/\s+/);
          const year = new Date().getFullYear().toString().slice(-2);
          
          const raw = [
            bits.join(''),
            bits.length > 1 ? bits.join('.') : bits[0] + '_ai',
            bits.join('') + year
          ];

          const list = [...new Set(raw)].slice(0, 3);
          
          elements.recs.innerHTML = `
            <span class="text-[10px] uppercase text-slate-400 font-bold block w-full mb-1">Recommended:</span>
            ${list.map(s => `<div class="chip" data-val="${s}">${s}</div>`).join('')}
          `;
        };

        // --- Listeners ---

        elements.name.addEventListener('input', e => updateRecs(e.target.value));

        elements.handle.addEventListener('input', e => {
          state.isHandleTouched = true;
          checkHandle(e.target.value);
        });

        elements.recs.addEventListener('click', e => {
          const chip = e.target.closest('.chip');
          if (!chip) return;
          
          const val = chip.dataset.val;
          elements.handle.value = val;
          state.isHandleTouched = true;
          checkHandle(val);
          
          elements.handle.focus();
        });

        elements.toggles.forEach(btn => {
          btn.addEventListener('click', () => {
            const input = document.getElementById(btn.dataset.target);
            const icon = btn.querySelector('i');
            const show = input.type === 'password';
            
            input.type = show ? 'text' : 'password';
            input.style.letterSpacing = show ? 'normal' : '0.15em';
            icon.className = show ? 'far fa-eye-slash' : 'far fa-eye';
          });
        });

        elements.form.addEventListener('submit', e => {
          e.preventDefault();
          
          const isTaken = CONFIG.existingUsers.includes(elements.handle.value.toLowerCase().trim());
          if (isTaken) return elements.handle.focus();

          if (elements.pass.value.length < CONFIG.minPassLength) {
            return elements.pass.focus();
          }

          if (elements.pass.value !== elements.confirm.value) {
            elements.confirm.style.borderColor = '#ef4444';
            return elements.confirm.focus();
          }

          // UI Transition
          elements.submit.disabled = true;
          elements.submit.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Initializing...';

          setTimeout(() => {
            elements.submit.innerHTML = '<i class="fas fa-check mr-2"></i> Account Created';
            elements.submit.style.backgroundColor = "#16a34a";
            // Redirect to login page
          setTimeout(() => {
            window.location.href = "login.html";
          }, 1000);

}, 1500);
        });

      })();
    </script>
  </body>
</html>
