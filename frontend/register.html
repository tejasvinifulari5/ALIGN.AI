<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | ALIGN.AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --surface: #f8fafc;
        --border: #e2e8f0;
      }

      body {
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #fdfdfd;
      }

      .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .auth-card {
        width: 100%;
        max-width: 440px;
        background: #fff;
        padding: 2.5rem;
        border-radius: 24px;
        border: 1px solid var(--border);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
      }

      .brand-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 1.25rem;
        background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
        border: 1px solid #bfdbfe;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.1);
      }

      .brand-title {
        font-size: 1.875rem;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.025em;
        line-height: 1.2;
      }

      .field-group {
        margin-bottom: 1.25rem;
      }

      .field-label {
        display: block;
        font-size: 0.813rem;
        font-weight: 600;
        color: #475569;
        margin-bottom: 0.5rem;
        margin-left: 0.1rem;
      }

      .control {
        width: 100%;
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        font-size: 0.938rem;
        color: #1e293b;
        transition: all 0.2s ease;
      }

      .control:focus {
        outline: none;
        border-color: var(--primary);
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
      }

      .control[type="password"] {
        letter-spacing: 0.15em;
      }

      .suggestion-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.5rem;
        min-height: 28px;
      }

      .chip {
        font-size: 0.75rem;
        background-color: #eff6ff;
        color: var(--primary);
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        cursor: pointer;
        border: 1px solid #dbeafe;
        transition: all 0.2s;
      }

      .chip:hover {
        background-color: #dbeafe;
        transform: translateY(-1px);
      }

      .status-msg {
        font-size: 0.7rem;
        margin-top: 0.4rem;
        display: flex;
        align-items: center;
        gap: 0.25rem;
        font-weight: 500;
      }

      .view-toggle {
        position: absolute;
        right: 0.875rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        cursor: pointer;
        padding: 4px;
        font-size: 0.9rem;
      }

      .hint {
        font-size: 0.75rem;
        color: #64748b;
        margin-top: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }

      .btn-submit {
        width: 100%;
        background-color: var(--primary);
        color: #fff;
        padding: 0.875rem;
        border-radius: 12px;
        font-weight: 700;
        font-size: 0.938rem;
        transition: all 0.2s;
        margin-top: 1rem;
        box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
      }

      .btn-submit:active {
        transform: scale(0.98);
      }

      .btn-submit:hover:not(:disabled) {
        background-color: var(--primary-dark);
      }

      .btn-submit:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .logo-img {
        width: 60px; /* increased size */
        height: 80px;
        object-fit: contain;
        mix-blend-mode: multiply;
        display: block;
        margin: 0 auto; /* centers the image horizontally */
      }
    </style>
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card">
        <header class="text-center mb-10">
          <div class="brand-logo-box">
            <img src="assets/logo.png" alt="ALIGN.AI Logo" class="logo-img" />
          </div>
          
          <h1 class="brand-title">ALIGN.<span class="text-blue-600">AI</span></h1>
          <p class="text-slate-500 mt-2 text-sm">Start your AI-powered posture analysis journey.</p>
        </header>

        <form id="authForm" novalidate>
          <div class="field-group">
            <label class="field-label">Full Name</label>
            <input type="text" id="name" required class="control" autocomplete="name" />
          </div>

          <div class="field-group">
            <label class="field-label">Email Address</label>
            <input type="email" id="email" required class="control" autocomplete="email" />
          </div>

          <div class="field-group">
            <label class="field-label">Username</label>
            <input type="text" id="handle" required class="control" />
            <div id="handleStatus"></div>
            <div id="handleRecs" class="suggestion-list"></div>
          </div>

          <div class="field-group">
            <label class="field-label">Password</label>
            <div class="relative">
              <input type="password" id="pass" required class="control" autocomplete="new-password" />
              <button type="button" class="view-toggle" data-target="pass">
                <i class="far fa-eye"></i>
              </button>
            </div>
            <p class="hint"><i class="fas fa-info-circle"></i> Min. 8 characters</p>
          </div>

          <div class="field-group">
            <label class="field-label">Confirm Password</label>
            <div class="relative">
              <input type="password" id="confirm" required class="control" autocomplete="new-password" />
              <button type="button" class="view-toggle" data-target="confirm">
                <i class="far fa-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" id="submitBtn" class="btn-submit">Create Account</button>
          
          <div class="text-center mt-6">
            <p class="text-sm text-slate-500">
              Already have an account? <a href="login.html" class="text-blue-600 font-semibold hover:underline">Log in</a>
            </p>
          </div>
        </form>

        <footer class="text-slate-400 text-[10px] text-center mt-8 uppercase tracking-widest font-bold">
          &copy; 2026 ALIGN.AI
        </footer>
      </div>
    </div>
    <script src="js/register.js"></script>

  </body>
</html>
