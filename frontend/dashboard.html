<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALIGN.AI - User Dashboard</title>

    <!-- UI Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --brand-primary: #2563eb;
        --brand-dark: #1d4ed8;
        --surface-light: #f8fafc;
        --border-default: #e2e8f0;
        --text-main: #0f172a;
        --text-muted: #64748b;
      }

      body {
        font-family: "Inter", -apple-system, sans-serif;
        background-color: #f1f5f9;
        color: var(--text-main);
        -webkit-font-smoothing: antialiased;
      }

      .app-shell {
  width: 100%;
  min-height: 100vh;
  margin: 0;
  padding: 0;
}
      .card-main {
  background: #ffffff;
  width: 100%;
  min-height: 100vh;
  border-radius: 0;
  overflow: hidden;
}

      /* Profile Header */
      .hero-banner {
        background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-dark) 100%);
        color: #ffffff;
        padding: 2rem 1.5rem;
      }

      .avatar-placeholder {
        width: 3rem;
        height: 3rem;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
      }

      /* Statistics Grid */
      .summary-stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        padding: 1.5rem;
        background: #ffffff;
        border-bottom: 1px solid var(--border-default);
      }

      .stat-tile {
        background: var(--surface-light);
        padding: 1rem;
        border-radius: 16px;
        text-align: center;
        border: 1px solid var(--border-default);
      }

      .stat-tile .val {
        display: block;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--brand-primary);
      }

      .stat-tile .label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: 0.25rem;
      }

      /* Navigation Actions */
      .nav-group {
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .nav-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        font-weight: 600;
        transition: all 200ms ease;
        border: 1px solid var(--border-default);
        background: #ffffff;
        color: #334155;
        cursor: pointer;
      }

      .nav-item:hover {
        background: var(--surface-light);
        transform: translateX(4px);
        border-color: var(--brand-primary);
      }

      /* History/Activity */
      .activity-feed {
        padding: 1.5rem;
        border-top: 1px solid var(--border-default);
      }

      .activity-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 0;
        border-bottom: 1px solid #f1f5f9;
      }

      .activity-item:last-of-type {
        border-bottom: none;
      }

      /* Helpers & Notifications */
      .advice-callout {
        margin: 1.5rem;
        padding: 1rem;
        background: #f0f9ff;
        border-radius: 12px;
        border: 1px solid #bae6fd;
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
      }

      .footer-actions {
        padding: 1rem 1.5rem 2rem;
        text-align: center;
      }
    </style>
  </head>
  <body class="bg-slate-100">
    <div class="app-shell">
      <main class="card-main">
        
        <!-- User Welcome Section -->
        <header class="hero-banner">
          <div class="flex justify-between items-center">
            <section>
              <p class="text-blue-100 text-sm opacity-90">Welcome back,</p>
              <h1 class="text-2xl font-bold tracking-tight">Tejasvini 👋</h1>
            </section>
            <aside class="avatar-placeholder">
               <i class="fas fa-user text-xl"></i>
            </aside>
          </div>
        </header>

        <!-- Quick Summary Metrics -->
        <section class="summary-stats">
          <article class="stat-tile">
            <span class="val">12</span>
            <span class="label">Total Workouts</span>
          </article>
          <article class="stat-tile">
            <span class="val">88</span>
            <span class="label">Best Stability</span>
          </article>
        </section>

        <!-- Primary Navigation -->
        <nav class="nav-group">
          <button class="nav-item">
            <span class="flex items-center gap-3">
              <i class="fas fa-play text-blue-600"></i> Start Workout
            </span>
            <i class="fas fa-chevron-right text-xs text-slate-400"></i>
          </button>
          
          <button class="nav-item">
            <span class="flex items-center gap-3">
              <i class="fas fa-chart-line text-blue-600"></i> View Progress
            </span>
            <i class="fas fa-chevron-right text-xs text-slate-400"></i>
          </button>

          <button class="nav-item">
            <span class="flex items-center gap-3">
              <i class="fas fa-book-open text-blue-600"></i> Exercise Instructions
            </span>
            <i class="fas fa-chevron-right text-xs text-slate-400"></i>
          </button>
          <button class="nav-item" onclick="window.location.href='profile.html'">
  <span class="flex items-center gap-3">
    <i class="fas fa-user text-blue-600"></i> Profile Settings
  </span>
  <i class="fas fa-chevron-right text-xs text-slate-400"></i>
</button>
        </nav>

        <!-- Logged Activity -->
        <section class="activity-feed">
          <header class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider">Recent Activity</h2>
            <!-- Watch and arrow removed from here -->
          </header>
          
          <div class="activity-item">
            <div>
              <p class="font-semibold text-slate-800 text-sm">Squats</p>
              <time class="text-xs text-slate-500">20 Mar</time>
            </div>
            <div class="text-right">
              <span class="text-sm font-bold text-blue-600">Score: 82</span>
            </div>
          </div>

          <div class="activity-item">
            <div>
              <p class="font-semibold text-slate-800 text-sm">Pushups</p>
              <time class="text-xs text-slate-500">18 Mar</time>
            </div>
            <div class="text-right">
              <span class="text-sm font-bold text-blue-600">Score: 75</span>
            </div>
          </div>
        </section>

        <!-- Contextual Insight -->
        <aside class="advice-callout">
          <i class="fas fa-lightbulb text-blue-600 mt-0.5"></i>
          <p class="text-xs text-blue-800 leading-relaxed">
            <strong class="font-bold">Tip:</strong> Keep knees aligned with toes during squats to ensure maximum stability.
          </p>
        </aside>

        <!-- Account Actions -->
        <footer class="footer-actions">
          <a href="login.html" class="text-sm font-semibold text-slate-400 hover:text-red-500 transition-colors">
            <i class="fas fa-sign-out-alt mr-1"></i> Logout
          </a>
        </footer>
      </main>

      <div class="mt-8 text-center">
        <p class="text-slate-400 text-[10px] uppercase tracking-widest font-bold">
          &copy; 2026 ALIGN.AI
        </p>
      </div>
    </div>
  </body>
</html>
